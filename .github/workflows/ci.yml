name: ci
on:
    push:
        paths-ignore:
            - 'website/**'
    workflow_dispatch:

jobs:
    builds:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - uses: ./.github/actions/deno
            - run: deno run build

            - name: Package browser ZIPs
              run: |
                  mkdir -p dist
                  for platform in chrome edge firefox; do
                      if [ -d "release/$platform" ]; then
                          cd "release/$platform"
                          zip -r "../../dist/yako-${platform}.zip" .
                          cd ../..
                      fi
                  done

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: yako-extensions
                  path: dist/*.zip

    tests:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - uses: ./.github/actions/deno
            - run: deno run test

    types:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - uses: ./.github/actions/deno
            - run: deno check

    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - uses: ./.github/actions/deno
            - run: deno lint

    format:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - uses: ./.github/actions/deno
            - run: deno fmt --check
